# cargo-deny licence and advisory lane for host-reference (call/0033).
#
# Policy: AGPL is banned and is never added to the exceptions below. GPL is
# avoided; a GPL crate fails this lane until it is named in `exceptions`, and
# naming it there is the deliberate act of flagging it (for example the
# out-of-process OpenSCAD helper). Weak copyleft (MPL-2.0) and the permissive
# licences are allowed outright. Any licence absent from `allow` fails the lane,
# so AGPL and an unflagged GPL both stop the build.

[licenses]
version = 2
confidence-threshold = 0.9
# The licences encountered in the current tree. Each reader adds the licence its
# libraries carry as it lands, which is where that licence is reviewed (call/0033).
# The wider permissive set (the BSD pair, MPL-2.0, 0BSD, and the rest) joins on
# first use.
allow = [
    "0BSD",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
# No GPL exception yet. A GPL crate is added here by name to flag it; AGPL never is.
#   exceptions = [{ name = "the-openscad-helper", allow = ["GPL-3.0-or-later"] }]
exceptions = []

[advisories]
version = 2
ignore = [
    # paste is a stable, ubiquitous proc-macro helper pulled transitively by parquet. Its author
    # marked it unmaintained (RUSTSEC-2024-0436), but there is no vulnerability and no safe upgrade,
    # so this informational advisory is accepted rather than failing the lane.
    "RUSTSEC-2024-0436",
    # proc-macro-error is a build-time proc-macro helper pulled transitively by ruststep-derive (the
    # STEP reader). Its author marked it unmaintained (RUSTSEC-2024-0370), but there is no
    # vulnerability and no safe upgrade through ruststep, so it is accepted on the same footing as
    # paste above.
    "RUSTSEC-2024-0370",
]

[bans]
multiple-versions = "allow"
